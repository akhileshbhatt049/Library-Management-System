<html>

<head>
    <title>Account</title>

    <style>
.account-wrapper {
    display: flex;
    justify-content: center;
    background-color: #f9f9f9;
    padding: 40px 20px;
}

/* Container */
.account-container {
    display: flex;
    width: 100%;
    max-width: 1100px;
    background: #ffffff;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    border-radius: 10px;
    overflow: hidden;
}

/* Sidebar */
.account-sidebar {
    width: 260px;
    background-color: #f4f4f4;
    padding: 25px;
    border-right: 1px solid #ddd;
}

.sidebar-title {
    font-size: 20px;
    margin-bottom: 25px;
    color: #333;
}

.sidebar-menu {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.menu-item {
    text-decoration: none;
    color: #444;
    padding: 12px;
    border-radius: 8px;
    transition: 0.3s ease;
    font-weight: 500;
}

.menu-item:hover {
    background-color: #e6e6e6;
}

.menu-item.active {
    background-color: #f39c12;
    color: #fff;
}

/* Main Panel */
.account-details-panel {
    flex: 1;
    padding: 40px;
    background-color: #fafafa;
}

.panel-heading {
    font-size: 22px;
    margin-bottom: 25px;
    color: #333;
}

/* Content Layout */
.details-content {
    display: flex;
    gap: 50px;
    align-items: flex-start;
}

/* Avatar Section */
.avatar-column {
    display: flex;
    flex-direction: column;
    align-items: center;
}

.avatar-frame {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: #fff;
    border: 2px solid #ddd;
    overflow: hidden;
    margin-bottom: 15px;
}

.avatar-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* Form Section */
.form-column {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 18px;
}

.input-field label {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 5px;
    display: block;
    color: #555;
}

.input-field input {
    width: 100%;
    padding: 10px 12px;
    border-radius: 6px;
    border: 1px solid #ccc;
    background-color: #fff;
    transition: 0.3s;
}

.input-field input:focus {
    border-color: #f39c12;
    outline: none;
}

/* Buttons */
.btn-action {
    padding: 8px 18px;
    border-radius: 20px;
    background-color: #ddd;
    cursor: pointer;
    font-weight: 600;
    border: none;
    transition: 0.3s;
}

.btn-action:hover {
    background-color: #ccc;
}

.save-btn {
    background-color: #f39c12;
    color: #fff;
    width: fit-content;
}

.save-btn:hover {
    background-color: #e67e22;
}

/* Stats Section */
.account-stats {
    margin-top: 40px;
    padding-top: 20px;
    border-top: 1px solid #ddd;
    text-align: center;
}

.account-stats h4 {
    margin-bottom: 10px;
    color: #333;
}

.account-stats p {
    font-size: 14px;
    margin: 5px 0;
    color: #555;
}
    </style>




    </style>
</head>

<body>

    <!-- Navigation Bar -->
    <header class="header">
        <div class="Logo-Name">
            <img src="Assets/Images/logo.png" alt="Library Logo">
            <span>Library Management System</span>
        </div>

        <nav class="nav">
            <a href="Index.html" class="nav-link" id="Size">Home</a>
            <a href="BrowseBooks.html" class="nav-link" id="Size">Books</a>
            <a href="BorrowBooks.html" class="nav-link " id="Size">Borrow Books</a>
            <a href="Syllabus.html" class="nav-link" id="Size">Syllabus</a>
            <a href="RequestBook.html" class="nav-link" id="Size">Request Books</a>
            <a href="Contact.html" class="nav-link" id="Size">Contacts</a>
            <a href="Account.html" class="nav-link active" id="Size">Account</a>
        </nav>
    </header>

    <!-- Body Content -->
    <main class="account-wrapper">
        <div class="account-container">
            <aside class="account-sidebar">
                <h2 class="sidebar-title">My Account</h2>
                <div class="sidebar-menu">
                    <a href="#" class="menu-item active">Account Details</a>
                    <a href="#" class="menu-item">Borrowed Books</a>
                    <a href="#" class="menu-item">Books Requests</a>
                    <a href="#" class="menu-item">Change Password</a>
                </div>
            </aside>

            <section class="account-details-panel">
                <h3 class="panel-heading">Account Details</h3>

                <div class="details-content">
                    <div class="avatar-column">
                        <div class="avatar-frame">
                            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Library" alt="Profile">
                        </div>
                        <input type="file" class="btn-action">Change Picture</button>
                    </div>

                    <div class="form-column">
                        <div class="input-field">
                            <label>Full Name</label>
                            <input type="text" name="fullname">
                        </div>
                        <div class="input-field">
                            <label>Student Id</label>
                            <input type="text" name="studentid">
                        </div>
                        <div class="input-field">
                            <label>Email</label>
                            <input type="email" name="useremail">
                        </div>
                        <div class="input-field">
                            <label>Phone</label>
                            <input type="text" name="userphone">
                        </div>
                        <button type="submit" class="btn-action save-btn">Save Changes</button>
                    </div>
                </div>

                <div class="account-stats">
                    <h4>Account Information</h4>
                    <p>Total books Borrowed: <strong>5</strong></p>
                    <p>Pending Book Request: <strong>2</strong></p>
                </div>
            </section>
        </div>
    </main>
</body>

</html>
