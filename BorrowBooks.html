<!DOCTYPE html>
<html>  
    <head>
        <title>Borrow Books</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
        <link rel="stylesheet" type="text/css" href="Assets/CSS/Navigation Bar.css">
        <link rel="stylesheet" type="text/css" href="Assets/CSS/Borrow Books.css">
    </head>
    <body>
        <header class="header">
            <div class="Logo-Name">
                <img src="Assets/Images/logo.png" alt="Library Logo">
                <span>Library Management System</span>
            </div>

            <nav class="nav">
                <a href="#" class="nav-link" id="Size">Home</a>
                <a href="#" class="nav-link" id="Size">Books</a>
                <a href="#" class="nav-link active" id="Size">Borrow Books</a>
                <a href="#" class="nav-link" id="Size">Syllabus</a>
                <a href="#" class="nav-link" id="Size">Request Books</a>
                <a href="#" class="nav-link" id="Size">Contacts</a>
                <a href="#" class="nav-link" id="Size">Account</a>
            </nav>
        </header>

        <!-- Available Books to Borrow -->
        <div class="books-table">
            <table border="3" cellspacing="0" cellpadding="5">
                <thead>
                    <tr>
                        <th>Book Names</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tr>
                    <td class="book-title">The Great Gatsby</td>
                    <td><button type="button" class="borrow-btn" onclick="openModal('The Great Gatsby')"><i class="fa fa-book"></i>Borrow</button></td>
                </tr>
                <tr>
                    <td class="book-title">To Kill a Mockingbird</td>
                    <td><button type="button" class="borrow-btn" onclick="openModal('To Kill a Mockingbird')"><i class="fa fa-book"></i>Borrow</button></td>
                </tr>
                <tr>
                    <td class="book-title">1984</td>
                    <td><button type="button" class="borrow-btn" onclick="openModal('1984')"><i class="fa fa-book"></i>Borrow</button></td>
                </tr>
                <tr>
                    <td class="book-title">Pride and Prejudice</td>
                    <td><button type="button" class="borrow-btn" onclick="openModal('Pride and Prejudice')"><i class="fa fa-book"></i>Borrow</button></td>
                </tr>
            </table>
        </div>

        <!-- Pop-up Modal Form for borrowing books -->
        <div id="borrowModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2><i class="fa fa-book"></i> Borrow Book</h2>
                    <span class="close-btn" onclick="closeModal()">&times;</span>
                </div>
                
            <form id="borrowForm" class="borrow-form">                    
                    <!-- Book Name (auto-filled) -->
                    <div class="form-group">
                        <label><i class="fa fa-book"></i> Book Name:</label>
                        <input type="text" id="BookName" name="BookName" readonly required>
                    </div>

                    <!-- Full Name -->
                    <div class="form-group">
                        <label><i class="fa fa-user"></i> Full Name:</label>
                        <input type="text" id="Name" name="Name" placeholder="Enter your full name" required>
                    </div>

                    <!-- Student ID -->
                    <div class="form-group">
                        <label><i class="fa fa-id-card"></i> Student ID:</label>
                        <input type="text" id="StudentID" name="StudentID" placeholder="e.g., STU2024001" required>
                    </div>

                    <!-- Email and Phone in one row -->
                    <div class="form-row">
                        <div class="form-group">
                            <label><i class="fa fa-envelope"></i> Email:</label>
                            <input type="email" id="Email" name="Email" placeholder="your@email.com" required>
                        </div>

                        <div class="form-group">
                            <label><i class="fa fa-phone"></i> Phone:</label>
                            <input type="tel" id="Phone" name="Phone" placeholder="10 digit number" pattern="[0-9]{10}" title="Please enter a 10-digit phone number" required>
                        </div>
                    </div>

                    <!-- Return Date -->
                    <div class="form-group">
                        <label><i class="fa fa-calendar"></i> Return Date:</label>
                        <input type="date" id="ReturnDate" name="ReturnDate" min="" required>
                    </div>

                    <button type="submit" class="submit-btn">
                        <i class="fa fa-check-circle"></i> Submit Borrow Request
                    </button>
                </form>
            </div>
        </div>
        <script src="Assets/JS/borrow books.js"> </script>
        <script src="Assets/JS/Borrow books form validation.js"> </script>
    </body>
</html>
