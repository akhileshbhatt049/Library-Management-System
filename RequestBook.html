<!DOCTYPE html>
<html>  
    <head>
        <title>Request Books</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
        <link rel="stylesheet" type="text/css" href="Assets/CSS/Navigation Bar.css">
        <style>
            /* Write CSS code here */
            .details{
                margin-left: 50px;
            }



            .divider-light {
                width: 350px;
                height: 5px;
                background-color: rgba(97, 95, 95, 0.25);
                margin: -25px auto 20px 30px;
                border: 0;
                border-radius: 2px;
            }

        


        </style>
    </head>
    <body>
        <header class="header">
            <div class="Logo-Name">
                <img src="Assets/Images/logo.png" alt="Library Logo">
                <span>Library Management System</span>
            </div>

            <nav class="nav">
                <a href="#" class="nav-link" id="Size">Home</a>
                <a href="#" class="nav-link" id="Size">Books</a>
                <a href="#" class="nav-link active" id="Size">Borrow Books</a>
                <a href="#" class="nav-link" id="Size">Syllabus</a>
                <a href="#" class="nav-link" id="Size">Request Books</a>
                <a href="#" class="nav-link" id="Size">Contacts</a>
                <a href="#" class="nav-link" id="Size">Account</a>
            </nav>
        </header>

        <!-- Write Code form here -->
        <h1 class="details">Request a new book</h1>
        <hr class="divider-light" />
        <p>Fill out the form below to request a new book to be added to the library. 
            Our team will review your request and get back to you as soon as possible.</p>
            <section>
                <form action="#" >
                    <div class="form-request">
                        <label><i class="fa fa-user"></i> Full Name:</label>
                        <input type="text" id="name" name="Name" placeholder="Enter your full name">
                    </div>
                    <div class="form-request">
                        <label><i class="fa fa-envelope"></i> Email:</label>
                        <input type="email" id="email" name="Email" placeholder="Enter your email address">
                    </div>
                     <div class="form-request">
                        <label><i class="fa fa-book"></i> Book Title:</label>
                        <input type="text" id="Book title" name="Book title" placeholder="Enter your book title">
                    </div>
                    <div class="form-request">
                        <label><i class="fa fa-user"></i> Author:</label>
                        <input type="text" id="Author" name="Author" placeholder="Enter the author's name">
                    </div>
                         <div class="form-request">
                        <label><i class="fa fa-user"></i> Reason for request:</label>
                        <input type="text" id="reason" name="reason" placeholder="Enter reason for your request">
                    </div>
                      <button type="submit" class="submit-btn">
                        <i class="fa fa-paper-plane"></i> Send Message
                    </button>
                    
                </form>
                <section>
                    
                </section>
                <img src="Assets/Images/Request book.png" alt="Book" title="Book">
            </section>

    </body>
</html>
