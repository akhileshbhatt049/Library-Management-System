<html>

<head>
    <title>Request Books</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" type="text/css" href="Assets/CSS/Navigation Bar.css">
    <link rel="stylesheet" type="text/css" href="Assets/CSS/RequestBook.css">
    <style>
        
    </style>
</head>

<body>

    <!-- Navigation Bar -->
    <header class="header">
        <div class="Logo-Name">
            <img src="Assets/Images/logo.png" alt="Library Logo">
            <span>Library Management System</span>
        </div>

        <nav class="nav">
            <a href="Index.html" class="nav-link" id="Size">Home</a>
            <a href="BrowseBooks.html" class="nav-link" id="Size">Books</a>
            <a href="BorrowBooks.html" class="nav-link" id="Size">Borrow Books</a>
            <a href="Syllabus.html" class="nav-link" id="Size">Syllabus</a>
            <a href="RequestBook.html" class="nav-link active" id="Size">Request Books</a>
            <a href="Contact.html" class="nav-link" id="Size">Contacts</a>
            <a href="Account.html" class="nav-link" id="Size">Account</a>
        </nav>
    </header>

    <!-- Body Part -->
    <h1 class="details">Request a new book</h1>
    <hr class="divider-light" />
    <p>Fill out the form below to request a new book to be added to the library.
        Our team will review your request and get back to you as soon as possible.</p>

    <!-- Form Part -->
    <section>
        <form action="PHP/RequestBook.php" method="post">
            <div class="form-request">
                <label><i class="fa fa-user"></i> Full Name:</label>
                <input type="text" id="name" name="Name" placeholder="Full Name">
            </div>
            <div class="form-request">
                <label><i class="fa fa-envelope"></i> Email:</label>
                <input type="email" id="email" name="Email" placeholder="Email">
            </div>
            <div class="form-request">
                <label><i class="fa fa-book"></i> Book Title:</label>
                <input type="text" id="Book title" name="BookTitle" placeholder="Book Title">
            </div>
            <div class="form-request">
                <label><i class="fa fa-user"></i> Author:</label>
                <input type="text" id="Author" name="Author" placeholder="Author Name">
            </div>
            <div class="form-request">
                <label><i class="fa fa-pencil"></i> Reason for Request:</label>
                <input type="text" id="reason" name="Reason"
                    placeholder="Enter the reason you would like this book added to the library...">
            </div>
            <button type="submit" name="submit" class="submit-btn">
                <i class="fa fa-paper-plane"></i> Submit Request
            </button>
        </form>
        <img src="Assets/Images/Request book.png" alt="Book" title="Book">
    </section>
    <!-- <script src="Assets/JS/RequestBooks.js"></script> -->
</body>
</html>
