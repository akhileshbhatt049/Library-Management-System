    <body>
        <header class="header">
            <div class="Logo-Name">
                <img src="Assets/Images/logo.png" alt="Library Logo">

        <h1 class="Page-name">Contact Us</h1>
        <hr class="divider-light" />

        <p id="Written-text">Feel free to reach out to us with any questions or feedback.</p>

        <div class="contact-container">
            <section class="message-area">
                <p><i class="fa fa-paper-plane"></i> Send us a message</p>
                <form id="contactForm" action="PHP/Contact.php" method="post">
                    <div class="form-group">
                        <label><i class="fa fa-user"></i> Full Name:</label>
                        <input type="text" id="name" name="Name" placeholder="Enter your full name">
                    </div>
                    <div class="form-group">
                        <label><i class="fa fa-envelope"></i> Email:</label>
                        <input type="email" id="email" name="Email" placeholder="Enter your email">
                    </div>
                    <div class="form-group">
                        <label><i class="fa fa-comment"></i> Message:</label>
                        <textarea id="message" name="Message" placeholder="Write your message here..."></textarea>
                    </div>

                    <button type="submit" name="submit" class="submit-btn">
                        <i class="fa fa-paper-plane"></i> Send Message
                    </button>
                </form>
            </section>

            <section class="information-area">
                <p><i class="fa fa-info-circle"></i> Contact Information</p>
                <div class="info-item">
                    <i class="fa fa-envelope"></i>
                    <p>akhileshbhatt046@gmail.com</p>
                </div>
                <div class="info-item">
                    <i class="fa fa-phone"></i>
                    <p>9702617996</p>
                </div>
                <div class="info-item">
                    <i class="fa fa-map-marker"></i>
                    <p>shantinagar, Kathmandu</p>
                </div>
                <img src="Assets/Images/Contact book.png" alt="Contact Image" class="contact-image">
            </section>
        </div>
